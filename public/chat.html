<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Base Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --border: #2e3350;
        --text: #e2e4f0;
        --muted: #7c82a1;
        --accent: #4f6ef7;
        --accent-hover: #6b85ff;
        --green: #34c77b;
        --yellow: #f5c542;
        --red: #e05c5c;
        --radius: 10px;
      }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      /* ─── Layout ─────────────────────────────────────────────────── */
      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ─── Tab bar ────────────────────────────────────────────────── */
      .tab-bar {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }
      .tab {
        flex: 1;
        padding: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }
      .tab:hover { color: var(--text); }
      .tab.active { color: var(--text); border-bottom-color: var(--accent); }

      /* ─── Panels ─────────────────────────────────────────────────── */
      .panel {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
      }
      .panel.active { display: flex; }

      /* ─── Chat panel ─────────────────────────────────────────────── */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px 12px 8px;
      }

      .chat-bubble-row { display: flex; flex-direction: column; gap: 4px; }
      .chat-bubble-row.user { align-items: flex-end; }
      .chat-bubble-row.assistant { align-items: flex-start; }

      .chat-bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 0.875rem;
        line-height: 1.55;
        word-break: break-word;
      }
      .chat-bubble-row.user .chat-bubble {
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
        white-space: pre-wrap;
      }
      .chat-bubble-row.assistant .chat-bubble {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      /* Markdown */
      .chat-bubble.md p { margin: 0 0 8px; }
      .chat-bubble.md p:last-child { margin-bottom: 0; }
      .chat-bubble.md ul, .chat-bubble.md ol { margin: 4px 0 8px 18px; }
      .chat-bubble.md li { margin-bottom: 3px; }
      .chat-bubble.md strong { font-weight: 700; }
      .chat-bubble.md em { font-style: italic; }
      .chat-bubble.md h1, .chat-bubble.md h2, .chat-bubble.md h3 { font-weight: 700; margin: 10px 0 4px; line-height: 1.3; }
      .chat-bubble.md h1 { font-size: 1.05em; }
      .chat-bubble.md h2 { font-size: 0.97em; }
      .chat-bubble.md h3 { font-size: 0.92em; }
      .chat-bubble.md code { font-family: "SF Mono", Menlo, monospace; font-size: 0.85em; background: rgba(0,0,0,0.25); padding: 1px 5px; border-radius: 4px; }
      .chat-bubble.md pre { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
      .chat-bubble.md pre code { background: none; padding: 0; font-size: 0.82em; }
      .chat-bubble.md blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--muted); margin: 6px 0; }
      .chat-bubble.md a { color: var(--accent); text-decoration: underline; }

      .chat-sources { max-width: 85%; margin-top: 2px; }
      .chat-sources-toggle { font-size: 0.72rem; color: var(--muted); cursor: pointer; background: none; border: none; padding: 0; }
      .chat-sources-toggle:hover { color: var(--text); }
      .chat-sources-list { display: none; margin-top: 6px; flex-direction: column; gap: 4px; }
      .chat-sources-list.open { display: flex; }
      .chat-source-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; color: var(--muted); }
      .no-sources-note { font-size: 0.72rem; color: var(--muted); font-style: italic; }

      .chat-typing {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        border-bottom-left-radius: 4px;
        font-size: 0.82rem;
        color: var(--muted);
        max-width: 85%;
      }

      .chat-input-row {
        display: flex;
        gap: 8px;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .chat-input-row input {
        flex: 1;
        padding: 9px 12px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      .chat-input-row input::placeholder { color: var(--muted); }
      .chat-input-row input:focus { border-color: var(--accent); }

      .send-btn {
        padding: 9px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 7px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .send-btn:hover { background: var(--accent-hover); }
      .send-btn:disabled { opacity: 0.5; cursor: default; }

      /* ─── Search panel ───────────────────────────────────────────── */
      .search-panel-inner {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }

      .search-input-row {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .search-input-row input {
        flex: 1;
        padding: 9px 12px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      .search-input-row input::placeholder { color: var(--muted); }
      .search-input-row input:focus { border-color: var(--accent); }

      .search-results {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      /* Document group */
      .doc-group {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .doc-group-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s;
      }
      .doc-group-header:hover { background: var(--surface2); }
      .doc-group-icon { font-size: 1.1rem; flex-shrink: 0; }
      .doc-group-name { flex: 1; font-size: 0.9rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .doc-group-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
      .doc-group-chevron { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
      .doc-group.open .doc-group-chevron { transform: rotate(90deg); }

      .doc-chunks { display: none; border-top: 1px solid var(--border); }
      .doc-group.open .doc-chunks { display: block; }

      .chunk-entry {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-size: 0.82rem;
        line-height: 1.6;
        color: var(--muted);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .chunk-entry:last-child { border-bottom: none; }

      /* Similarity badge */
      .sim-badge {
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 99px;
      }
      .sim-high { background: rgba(52,199,123,0.15); color: var(--green); }
      .sim-medium { background: rgba(245,197,66,0.15); color: var(--yellow); }
      .sim-low { background: rgba(124,130,161,0.15); color: var(--muted); }

      /* Empty / loading states */
      .state-msg {
        text-align: center;
        padding: 48px 20px;
        color: var(--muted);
        font-size: 0.875rem;
      }
      .state-msg-icon { font-size: 2rem; margin-bottom: 8px; }

      /* Spinner */
      .spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: currentColor;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="app">

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab active" id="tabChat" onclick="switchTab('chat')">💬 Chat</button>
        <button class="tab" id="tabSearch" onclick="switchTab('search')">🔍 Search</button>
      </div>

      <!-- Chat panel -->
      <div class="panel active" id="panelChat">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-bubble-row assistant">
            <div class="chat-bubble md">Hi! Ask me anything — I'll search the knowledge base and answer based on what I find.</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Ask a question…" autofocus />
          <button class="send-btn" id="chatSendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>

      <!-- Search panel -->
      <div class="panel" id="panelSearch">
        <div class="search-panel-inner">
          <div class="search-input-row">
            <input type="text" id="searchInput" placeholder="Search the knowledge base…" />
            <button class="send-btn" id="searchBtn" onclick="runSearch()">Search</button>
          </div>
          <div class="search-results" id="searchResults">
            <div class="state-msg">
              <div class="state-msg-icon">🔍</div>
              Enter a query to find relevant documents
            </div>
          </div>
        </div>
      </div>

    </div>

    <script>
      const FILE_ICONS = { PDF: "📕", DOCX: "📘", PPTX: "📙", MD: "📝" };
      let chatHistory = [];

      // ─── Tabs ──────────────────────────────────────────────────────
      function switchTab(tab) {
        document.getElementById("tabChat").classList.toggle("active", tab === "chat");
        document.getElementById("tabSearch").classList.toggle("active", tab === "search");
        document.getElementById("panelChat").classList.toggle("active", tab === "chat");
        document.getElementById("panelSearch").classList.toggle("active", tab === "search");
        if (tab === "search") document.getElementById("searchInput").focus();
        if (tab === "chat") document.getElementById("chatInput").focus();
      }

      // ─── Chat ──────────────────────────────────────────────────────
      document.getElementById("chatInput").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      async function sendMessage() {
        const input = document.getElementById("chatInput");
        const message = input.value.trim();
        if (!message) return;
        input.value = "";
        appendBubble("user", message);
        const typing = appendTyping();
        document.getElementById("chatSendBtn").disabled = true;
        try {
          const res = await fetch("/api/knowledge/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, history: chatHistory }),
          });
          if (!res.ok) throw new Error((await res.json()).error || res.statusText);
          const { reply, sources } = await res.json();
          typing.remove();
          appendBubble("assistant", reply, sources);
          chatHistory.push({ role: "user", content: message });
          chatHistory.push({ role: "assistant", content: reply });
        } catch (err) {
          typing.remove();
          appendBubble("assistant", "⚠️ " + err.message);
        } finally {
          document.getElementById("chatSendBtn").disabled = false;
          input.focus();
        }
      }

      function appendBubble(role, text, sources) {
        const msgs = document.getElementById("chatMessages");
        const row = document.createElement("div");
        row.className = "chat-bubble-row " + role;
        const bubble = document.createElement("div");
        if (role === "assistant") {
          bubble.className = "chat-bubble md";
          bubble.innerHTML = marked.parse(text);
        } else {
          bubble.className = "chat-bubble";
          bubble.textContent = text;
        }
        row.appendChild(bubble);
        if (role === "assistant") row.appendChild(buildSources(sources));
        msgs.appendChild(row);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function appendTyping() {
        const msgs = document.getElementById("chatMessages");
        const row = document.createElement("div");
        row.className = "chat-bubble-row assistant";
        row.innerHTML = '<div class="chat-typing"><div class="spinner"></div> Thinking…</div>';
        msgs.appendChild(row);
        msgs.scrollTop = msgs.scrollHeight;
        return row;
      }

      function buildSources(sources) {
        const wrap = document.createElement("div");
        wrap.className = "chat-sources";
        if (!sources || !sources.length) {
          wrap.innerHTML = '<span class="no-sources-note">No knowledge base context used</span>';
          return wrap;
        }
        const toggle = document.createElement("button");
        toggle.className = "chat-sources-toggle";
        toggle.textContent = `📎 ${sources.length} source${sources.length !== 1 ? "s" : ""} used — show`;
        const list = document.createElement("div");
        list.className = "chat-sources-list";
        let open = false;
        toggle.addEventListener("click", () => {
          open = !open;
          list.classList.toggle("open", open);
          toggle.textContent = `📎 ${sources.length} source${sources.length !== 1 ? "s" : ""} used — ${open ? "hide" : "show"}`;
        });
        for (const s of sources) {
          const pct = Math.round(s.similarity * 100);
          const simClass = pct >= 75 ? "sim-high" : pct >= 50 ? "sim-medium" : "sim-low";
          const chip = document.createElement("div");
          chip.className = "chat-source-chip";
          chip.innerHTML = `<span>${FILE_ICONS[s.fileType] || "📄"}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(s.filename)}</span><span class="sim-badge ${simClass}">${pct}%</span>`;
          list.appendChild(chip);
        }
        wrap.appendChild(toggle);
        wrap.appendChild(list);
        return wrap;
      }

      // ─── Search ────────────────────────────────────────────────────
      document.getElementById("searchInput").addEventListener("keydown", e => {
        if (e.key === "Enter") runSearch();
      });

      async function runSearch() {
        const q = document.getElementById("searchInput").value.trim();
        const resultsEl = document.getElementById("searchResults");
        if (!q) return;

        resultsEl.innerHTML = '<div class="state-msg"><div class="spinner" style="width:20px;height:20px;border-width:3px;"></div></div>';
        document.getElementById("searchBtn").disabled = true;

        try {
          const res = await fetch(`/api/knowledge/search?q=${encodeURIComponent(q)}&limit=12`);
          if (!res.ok) throw new Error((await res.json()).error || res.statusText);
          renderSearchResults(await res.json(), q);
        } catch (err) {
          resultsEl.innerHTML = `<div class="state-msg"><div class="state-msg-icon">⚠️</div>${escHtml(err.message)}</div>`;
        } finally {
          document.getElementById("searchBtn").disabled = false;
        }
      }

      function renderSearchResults(results, query) {
        const el = document.getElementById("searchResults");
        if (!results.length) {
          el.innerHTML = '<div class="state-msg"><div class="state-msg-icon">🔍</div>No matching content found</div>';
          return;
        }

        // Group chunks by document
        const grouped = new Map();
        for (const r of results) {
          if (!grouped.has(r.documentId)) {
            grouped.set(r.documentId, { filename: r.filename, fileType: r.fileType, chunks: [] });
          }
          grouped.get(r.documentId).chunks.push(r);
        }

        el.innerHTML = "";
        for (const [, doc] of grouped) {
          el.appendChild(buildDocGroup(doc));
        }
      }

      function buildDocGroup(doc) {
        const group = document.createElement("div");
        group.className = "doc-group open";

        const bestPct = Math.round(Math.max(...doc.chunks.map(c => c.similarity)) * 100);
        const simClass = bestPct >= 75 ? "sim-high" : bestPct >= 50 ? "sim-medium" : "sim-low";

        group.innerHTML = `
          <div class="doc-group-header">
            <span class="doc-group-icon">${FILE_ICONS[doc.fileType] || "📄"}</span>
            <span class="doc-group-name" title="${escHtml(doc.filename)}">${escHtml(doc.filename)}</span>
            <div class="doc-group-meta">
              <span class="sim-badge ${simClass}">${bestPct}% match</span>
              <span class="doc-group-chevron">▶</span>
            </div>
          </div>
          <div class="doc-chunks"></div>`;

        const header = group.querySelector(".doc-group-header");
        const chunksEl = group.querySelector(".doc-chunks");

        for (const chunk of doc.chunks) {
          const entry = document.createElement("div");
          entry.className = "chunk-entry";
          entry.textContent = chunk.editedContent || chunk.content;
          chunksEl.appendChild(entry);
        }

        header.addEventListener("click", () => group.classList.toggle("open"));

        return group;
      }

      // ─── Helpers ───────────────────────────────────────────────────
      function escHtml(str) {
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
