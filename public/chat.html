<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Base Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --border: #2e3350;
        --text: #e2e4f0;
        --muted: #7c82a1;
        --accent: #4f6ef7;
        --accent-hover: #6b85ff;
        --green: #34c77b;
        --yellow: #f5c542;
        --radius: 10px;
      }

      html, body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .chat-wrap {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 12px;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 4px 2px 8px;
      }

      .chat-bubble-row { display: flex; flex-direction: column; gap: 4px; }
      .chat-bubble-row.user { align-items: flex-end; }
      .chat-bubble-row.assistant { align-items: flex-start; }

      .chat-bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 0.875rem;
        line-height: 1.55;
        word-break: break-word;
      }
      .chat-bubble-row.user .chat-bubble {
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
        white-space: pre-wrap;
      }
      .chat-bubble-row.assistant .chat-bubble {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      /* Markdown inside assistant bubbles */
      .chat-bubble.md p { margin: 0 0 8px; }
      .chat-bubble.md p:last-child { margin-bottom: 0; }
      .chat-bubble.md ul, .chat-bubble.md ol { margin: 4px 0 8px 18px; }
      .chat-bubble.md li { margin-bottom: 3px; }
      .chat-bubble.md strong { font-weight: 700; }
      .chat-bubble.md em { font-style: italic; }
      .chat-bubble.md h1, .chat-bubble.md h2, .chat-bubble.md h3 { font-weight: 700; margin: 10px 0 4px; line-height: 1.3; }
      .chat-bubble.md h1 { font-size: 1.05em; }
      .chat-bubble.md h2 { font-size: 0.97em; }
      .chat-bubble.md h3 { font-size: 0.92em; }
      .chat-bubble.md code { font-family: "SF Mono", Menlo, monospace; font-size: 0.85em; background: rgba(0,0,0,0.25); padding: 1px 5px; border-radius: 4px; }
      .chat-bubble.md pre { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
      .chat-bubble.md pre code { background: none; padding: 0; font-size: 0.82em; }
      .chat-bubble.md blockquote { border-left: 3px solid var(--accent); padding-left: 10px; color: var(--muted); margin: 6px 0; }
      .chat-bubble.md a { color: var(--accent); text-decoration: underline; }

      .chat-sources { max-width: 85%; margin-top: 2px; }
      .chat-sources-toggle { font-size: 0.72rem; color: var(--muted); cursor: pointer; background: none; border: none; padding: 0; }
      .chat-sources-toggle:hover { color: var(--text); }
      .chat-sources-list { display: none; margin-top: 6px; flex-direction: column; gap: 4px; }
      .chat-sources-list.open { display: flex; }
      .chat-source-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; color: var(--muted); }
      .similarity-badge { flex-shrink: 0; font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
      .sim-high { background: rgba(52,199,123,0.15); color: var(--green); }
      .sim-medium { background: rgba(245,197,66,0.15); color: var(--yellow); }
      .sim-low { background: rgba(124,130,161,0.15); color: var(--muted); }
      .no-sources-note { font-size: 0.72rem; color: var(--muted); font-style: italic; }

      .chat-typing {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        border-bottom-left-radius: 4px;
        font-size: 0.82rem;
        color: var(--muted);
        max-width: 85%;
      }

      .chat-input-row {
        display: flex;
        gap: 8px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        margin-top: 8px;
      }

      .chat-input-row input {
        flex: 1;
        padding: 9px 12px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        color: var(--text);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      .chat-input-row input::placeholder { color: var(--muted); }
      .chat-input-row input:focus { border-color: var(--accent); }

      .send-btn {
        padding: 9px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 7px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .send-btn:hover { background: var(--accent-hover); }
      .send-btn:disabled { opacity: 0.5; cursor: default; }

      .spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: currentColor;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="chat-wrap">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-bubble-row assistant">
          <div class="chat-bubble md">Hi! Ask me anything — I'll search the knowledge base and answer based on what I find.</div>
        </div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Ask a question…" autofocus />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      const FILE_ICONS = { PDF: "📕", DOCX: "📘", PPTX: "📙", MD: "📝" };
      let history = [];

      document.getElementById("chatInput").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      async function sendMessage() {
        const input = document.getElementById("chatInput");
        const message = input.value.trim();
        if (!message) return;

        input.value = "";
        appendBubble("user", message);
        const typing = appendTyping();
        document.getElementById("sendBtn").disabled = true;

        try {
          const res = await fetch("/api/knowledge/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, history }),
          });
          if (!res.ok) throw new Error((await res.json()).error || res.statusText);
          const { reply, sources } = await res.json();
          typing.remove();
          appendBubble("assistant", reply, sources);
          history.push({ role: "user", content: message });
          history.push({ role: "assistant", content: reply });
        } catch (err) {
          typing.remove();
          appendBubble("assistant", "⚠️ " + err.message);
        } finally {
          document.getElementById("sendBtn").disabled = false;
          input.focus();
        }
      }

      function appendBubble(role, text, sources) {
        const msgs = document.getElementById("chatMessages");
        const row = document.createElement("div");
        row.className = "chat-bubble-row " + role;
        const bubble = document.createElement("div");
        if (role === "assistant") {
          bubble.className = "chat-bubble md";
          bubble.innerHTML = marked.parse(text);
        } else {
          bubble.className = "chat-bubble";
          bubble.textContent = text;
        }
        row.appendChild(bubble);
        if (role === "assistant") row.appendChild(buildSources(sources));
        msgs.appendChild(row);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function appendTyping() {
        const msgs = document.getElementById("chatMessages");
        const row = document.createElement("div");
        row.className = "chat-bubble-row assistant";
        row.innerHTML = '<div class="chat-typing"><div class="spinner"></div> Thinking…</div>';
        msgs.appendChild(row);
        msgs.scrollTop = msgs.scrollHeight;
        return row;
      }

      function buildSources(sources) {
        const wrap = document.createElement("div");
        wrap.className = "chat-sources";
        if (!sources || !sources.length) {
          wrap.innerHTML = '<span class="no-sources-note">No knowledge base context used</span>';
          return wrap;
        }
        const toggle = document.createElement("button");
        toggle.className = "chat-sources-toggle";
        toggle.textContent = `📎 ${sources.length} source${sources.length !== 1 ? "s" : ""} used — show`;
        const list = document.createElement("div");
        list.className = "chat-sources-list";
        let open = false;
        toggle.addEventListener("click", () => {
          open = !open;
          list.classList.toggle("open", open);
          toggle.textContent = `📎 ${sources.length} source${sources.length !== 1 ? "s" : ""} used — ${open ? "hide" : "show"}`;
        });
        for (const s of sources) {
          const pct = Math.round(s.similarity * 100);
          const simClass = pct >= 75 ? "sim-high" : pct >= 50 ? "sim-medium" : "sim-low";
          const chip = document.createElement("div");
          chip.className = "chat-source-chip";
          chip.innerHTML = `<span>${FILE_ICONS[s.fileType] || "📄"}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(s.filename)}</span><span class="similarity-badge ${simClass}">${pct}%</span>`;
          list.appendChild(chip);
        }
        wrap.appendChild(toggle);
        wrap.appendChild(list);
        return wrap;
      }

      function escHtml(str) {
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
